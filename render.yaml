services:
  - type: web
    name: agrich-exchange-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: SUPABASE_URL
        value: https://qnzfadvdxouztyvpbxbc.supabase.co
      - key: SUPABASE_SERVICE_KEY
        generateValue: false
